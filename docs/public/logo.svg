<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="lobsterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00fff9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff3864;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 龙虾身体 -->
  <ellipse cx="50" cy="55" rx="18" ry="25" fill="url(#lobsterGradient)" filter="url(#glow)"/>
  
  <!-- 龙虾头部 -->
  <ellipse cx="50" cy="35" rx="15" ry="12" fill="url(#lobsterGradient)" filter="url(#glow)"/>
  
  <!-- 左钳 -->
  <path d="M 32 40 Q 20 35 15 30 Q 12 28 10 32 Q 8 36 12 38 Q 18 42 25 45 Z" 
        fill="url(#lobsterGradient)" filter="url(#glow)"/>
  
  <!-- 右钳 -->
  <path d="M 68 40 Q 80 35 85 30 Q 88 28 90 32 Q 92 36 88 38 Q 82 42 75 45 Z" 
        fill="url(#lobsterGradient)" filter="url(#glow)"/>
  
  <!-- 尾巴 -->
  <path d="M 50 75 Q 45 85 40 90 Q 38 92 40 94 Q 42 96 44 94 Q 50 88 50 80 Z" 
        fill="url(#lobsterGradient)" filter="url(#glow)"/>
  <path d="M 50 75 Q 55 85 60 90 Q 62 92 60 94 Q 58 96 56 94 Q 50 88 50 80 Z" 
        fill="url(#lobsterGradient)" filter="url(#glow)"/>
  
  <!-- 触角 -->
  <line x1="45" y1="30" x2="40" y2="20" stroke="url(#lobsterGradient)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="55" y1="30" x2="60" y2="20" stroke="url(#lobsterGradient)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- 眼睛 -->
  <circle cx="45" cy="33" r="2" fill="#0a0e27"/>
  <circle cx="55" cy="33" r="2" fill="#0a0e27"/>
  <circle cx="45.5" cy="32.5" r="0.8" fill="#00fff9"/>
  <circle cx="55.5" cy="32.5" r="0.8" fill="#00fff9"/>
</svg>
